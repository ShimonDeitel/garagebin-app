name: Garagebin
options:
  bundleIdPrefix: com.shimondeitel.garagebin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Garagebin:
    type: application
    platform: iOS
    sources:
      - path: Garagebin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.garagebin
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Garagebin/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GaragebinTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GaragebinTests
      - path: Garagebin.storekit
    dependencies:
      - target: Garagebin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.garagebin.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GaragebinUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GaragebinUITests
    dependencies:
      - target: Garagebin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.garagebin.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Garagebin:
    build:
      targets:
        Garagebin: all
        GaragebinTests: [test]
        GaragebinUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Garagebin.storekit
    test:
      config: Debug
      storeKitConfiguration: Garagebin.storekit
      targets:
        - GaragebinTests
        - GaragebinUITests
    archive:
      config: Release
